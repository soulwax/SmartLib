name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    name: Typecheck, Build, Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXTAUTH_SECRET: ci-placeholder-secret-please-change-1234567890
      NEXTAUTH_URL: https://ci.local.bluesix.dev
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      DATABASE_URL_UNPOOLED: postgresql://ci:ci@127.0.0.1:5432/ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck + build
        run: pnpm run check

      - name: Run tests (if present)
        run: pnpm run test --if-present
